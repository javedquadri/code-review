name: "Gemini Shared Review Engine"

on:
  workflow_call:
    # FIX 1: Explicitly declare that this workflow accepts the secret
    secrets:
      GEMINI_API_KEY:
        required: true

jobs:
  review:
    name: AI Code Review
    if: ${{ github.event.pull_request.changed_files > 0 && github.event.pull_request.changed_files < 60 && github.event.pull_request.additions < 2000 && github.event.pull_request.deletions < 2000 }}
    runs-on: ubuntu-latest

    # Keep these explicit blocks inside the engine
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build diff
        id: diff
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin "$BASE" "$HEAD"
          
          git diff "$BASE...$HEAD" > raw.patch
          wc -c raw.patch
          head -c 120000 raw.patch > diff.patch
          
          echo "patch<<EOF" >> "$GITHUB_OUTPUT"
          cat diff.patch >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Gemini review
        id: review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MODEL: gemini-2.5-flash
          DIFF_DATA: ${{ steps.diff.outputs.patch }}
        run: |
          set -euo pipefail

          PROMPT=$(cat << 'EOF'
          You are reviewing a Pull Request for a **TypeScript** codebase 
          (React/Vite web app + Cloudflare Workers API + D1 database).

          You are viewing only the `git diff`. You do not see the entire codebase.
          Focus on the **cascading impact** of these changes. If a function
          signature changes, check whether the caller logic still makes sense 
          (even if the caller isn't in this exact diff chunk).
          Do NOT comment on code formatting, indentation, or missing semicolons 
          (linters handle that).

          **Analysis Tiers (Use these exact headers):**
          1. **🔴 Critical (Blocking Merge):**
             - Security vulnerabilities (SQLi, XSS, command injection, exposed secrets/API keys).
             - Data corruption/loss risks (incorrect transaction boundaries, missing rollbacks).
             - Logic that throws unhandled exceptions and crashes the runtime.
             - Removing or renaming public APIs / interfaces without backward compatibility.

          2. **🟡 Performance & Scalability:**
             - N+1 database queries, missing database indexes for new filters.
             - Blocking I/O in async loops, memory leaks (e.g., uncancelled timers/listeners).
             - Redundant iterations (O(n²) loops) on potentially large datasets.

          3. **🔵 Maintainability & Architecture:**
             - Violations of Single Responsibility Principle (massive functions > 200 lines).
             - Mutable state modifications that cause unexpected side-effects in unrelated modules.
             - Missing error handling for external API calls (no retry/timeout logic).
             - Debugging leftovers: `console.log`, `print()`, `pdb`, `debugger`, or commented-out test code.

          **Output Format:**
          - Use valid Markdown.
          - If a Tier has no issues, omit that header entirely.
          - Provide **code suggestions** in inline `backticks` if the fix is obvious.
          - At the end, include a **Risk Score**: `✅ Safe to Merge`, `⚠️ Proceed with Caution`, or `🚨 Blocked`.

          **Final Rule:** If absolutely nothing is found, reply exactly with:
          > LGTM! No structural, security, or performance issues identified.
          EOF
          )

          combined=$(printf '%s\n\nDiff:\n```diff\n%s\n```' "$PROMPT" "$DIFF_DATA")
          
          json=$(jq -n --arg c "$combined" --arg m "$MODEL" \
            '{contents:[{parts:[{text:$c}]}], generationConfig:{temperature:0.1}}')

          resp=$(curl -fsS \
            "https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent" \
            -H "x-goog-api-key: ${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$json")

          text=$(printf '%s' "$resp" | jq -r '.candidates[0].content.parts[0].text // "LGTM! No structural, security, or performance issues identified."')
          
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$text" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post review comment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
          BODY: ${{ steps.review.outputs.body }}
        run: |
          set -euo pipefail
          marker=""
          comment="${marker}

          ## 🛡️ Gemini Automated Audit

          ${BODY}"
          gh pr comment "$PR" --body "$comment"
