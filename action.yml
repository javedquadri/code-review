name: 'Gemini Central Review Engine'
description: 'Centralized, language-agnostic PR review action using Gemini'

inputs:
  gemini_api_key:
    description: 'Gemini API Key from Google AI Studio'
    required: true
  tech_stack:
    description: 'The technology stack (e.g., "TypeScript/React/Node.js", "Python/Django", "Go"). Leave blank for generic AI-driven detection from the diff.'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Evaluate and Build Diff
      id: diff
      shell: bash
      run: |
        set -euo pipefail
        
        BASE_SHA="${{ github.event.pull_request.base.sha }}"
        HEAD_SHA="${{ github.event.pull_request.head.sha }}"
        
        git fetch --no-tags origin "$BASE_SHA" "$HEAD_SHA"
        git diff "$BASE_SHA...$HEAD_SHA" > raw.patch

        if [ ! -s raw.patch ]; then
          echo "No structural code variations detected. Skipping AI evaluation."
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        
        echo "skip=false" >> "$GITHUB_OUTPUT"
        echo "patch<<EOF" >> "$GITHUB_OUTPUT"
        cat raw.patch >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"

    - name: Gemini Review
      id: review
      shell: bash
      if:     env:
        DIFF_DATA: ${{ steps.diff.outputs.patch }}
        TECH_STACK: ${{ inputs.tech_stack }}
      run: |
        set -euo pipefail

        # -----------------------------------------------------------------
        # 1. Build the context instruction dynamically
        # -----------------------------------------------------------------
        if [ -z "$TECH_STACK" ]; then
          CONTEXT_INSTRUCTION=$(cat << 'EOF'
        You are reviewing a Pull Request for an **unspecified codebase**.
        **Do not assume any specific framework.**
        Analyze the `git diff` to identify the primary language(s) and frameworks being used.
        Focus on generic, universal principles: security vulnerabilities (OWASP Top 10),
        performance bottlenecks (N+1 queries, O(n^2) loops), and maintainability (DRY, SOLID).
        EOF
        )
        else
          CONTEXT_INSTRUCTION="You are reviewing a Pull Request for a codebase written in: **${TECH_STACK}**."
        fi

        # -----------------------------------------------------------------
        # 2. Define the full review prompt (with placeholders)
        # -----------------------------------------------------------------
        PROMPT=$(cat << 'EOF'
        ${CONTEXT_INSTRUCTION}

        You are viewing only the `git diff`. You do not see the entire codebase.
        Focus on the **cascading impact** of these changes. If a function
        signature changes, check whether the caller logic still makes sense.
        Do NOT comment on code formatting, indentation, or missing semicolons.

        **Analysis Tiers (Use these exact headers):**
        1. **🔴 Critical (Blocking Merge):**
           - Security vulnerabilities (SQL injection, XSS, exposed secrets, unsafe deserialization).
           - Data corruption/loss risks (incorrect transaction boundaries).
           - Logic that throws unhandled exceptions and crashes the runtime.

        2. **🟡 Performance & Scalability:**
           - N+1 queries, missing database indexes for new filters.
           - Blocking I/O in async loops, memory leaks, inefficient algorithms.

        3. **🔵 Maintainability & Architecture:**
           - Violations of Single Responsibility Principle.
           - Debugging leftovers: `console.log`, `debugger`, or commented-out test code.

        **IMPORTANT OUTPUT RULES:**
        - **CRITICAL:** Do NOT include a top-level '## 🛡️ Gemini Automated Audit' header. The workflow adds this automatically.
        - Start directly with the **Analysis Tiers** (e.g., `🔴 Critical...`, `🟡 Performance...`, `🔵 Maintainability...`) or the Risk Score if no issues are found.
        - Use valid Markdown with real newlines, NOT literal '\n' characters.
        - If a Tier has no issues, omit that header entirely.
        - **CRITICAL COMPLIANCE:** You MUST always end the review with a **Risk Score** header line showing either: `✅ Safe to Merge`, `⚠️ Proceed with Caution`, or `🚨 Blocked`. Do not drop this section.

        **Final Rule:** If absolutely nothing is found, reply exactly with:
        > LGTM! No structural, security, or performance issues identified.
        EOF
        )

        # -----------------------------------------------------------------
        # 3. Inject the context instruction into the prompt
        # -----------------------------------------------------------------
        ESCAPED_CONTEXT=$(printf '%s\n' "$CONTEXT_INSTRUCTION" | sed 's/[&/\]/\\&/g')
        PROMPT=$(echo "$PROMPT" | sed "s/\${CONTEXT_INSTRUCTION}/$ESCAPED_CONTEXT/g")

        # -----------------------------------------------------------------
        # 4. Build the API request payload
        # -----------------------------------------------------------------
        combined=$(printf '%s\n\nDiff:\n```diff\n%s\n```' "$PROMPT" "$DIFF_DATA")
        json=$(jq -n --arg c "$combined" '{contents:[{parts:[{text:$c}]}], generationConfig:{temperature:0.1}}')

        # -----------------------------------------------------------------
        # 5. Call Gemini API with automatic 503 retry and recovery loops
        # -----------------------------------------------------------------
        echo "Contacting Gemini API endpoints..."
        if ! resp=$(curl -fsS \
          --retry 3 \
          --retry-delay 2 \
          --retry-connrefused \
          "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent" \
          -H "x-goog-api-key: ${{ inputs.gemini_api_key }}" \
          -H "Content-Type: application/json" \
          -d "$json"); then
          
          echo "⚠️ Gemini API is temporarily unavailable (503). Running alternative response bridge."
          echo "The Gemini API service is temporarily down or overloaded. Automated code checks skipped for this run update." > review.md
          exit 0
        fi

        # -----------------------------------------------------------------
        # 6. FIXED: Use printf to pipe raw string values safely without 
        #    letting the shell echo collapse formatting down into literal "\n".
        # -----------------------------------------------------------------
        printf '%s' "$resp" | jq -r '.candidates[0].content.parts[0].text // "LGTM! No structural, security, or performance issues identified."' > review.md

    - name: Post Review Comment
      shell: bash
      if: ${{ steps.diff.outputs.skip != 'true' }}
      env:
        GH_TOKEN: ${{ github.token }}
        PR: ${{ github.event.pull_request.number }}
        SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        set -euo pipefail

        # Strip any accidental duplicate literal escape sequences left behind
        sed -i 's/\\n/\n/g' review.md
        sed -i -e '/./,$!d' review.md

        # Build clean markdown document natively using real file appends
        printf '%s\n\n' '## 🛡️ Gemini Automated Audit' > comment.md
        cat review.md >> comment.md

        # Post the clean text file straight to the pull request timeline
        gh pr comment "$PR" --body-file comment.md
