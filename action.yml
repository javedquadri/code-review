name: 'Code Review'
description: 'AI-powered PR review with Gemini and DeepSeek fallback'

inputs:
  gemini_api_key:
    description: 'Gemini API Key from Google AI Studio'
    required: true
  deepseek_api_key:
    description: 'DeepSeek API Key (fallback provider)'
    required: false
    default: ''
  model:
    description: 'Primary Gemini model'
    required: false
    default: 'gemini-3.5-flash'
  fallback_gemini_model:
    description: 'Fallback Gemini model if primary fails'
    required: false
    default: 'gemini-2.5-flash'
  deepseek_model:
    description: 'DeepSeek model to use as fallback'
    required: false
    default: 'deepseek-v4-flash'
  tech_stack:
    description: 'Tech stack (e.g., "TypeScript/React"). Leave blank for AI detection.'
    required: false
    default: ''
  max_changed_lines:
    description: 'Max total lines before skipping review'
    required: false
    default: '3000'
  max_changed_files:
    description: 'Max changed files before skipping review'
    required: false
    default: '60'

runs:
  using: "composite"
  steps:
    - name: Evaluate Diff and Check PR Size
      id: diff
      shell: bash
      run: |
        set -euo pipefail
        
        BASE_SHA="${{ github.event.pull_request.base.sha }}"
        HEAD_SHA="${{ github.event.pull_request.head.sha }}"
        
        git fetch --no-tags origin "$BASE_SHA" "$HEAD_SHA"
        git diff "$BASE_SHA...$HEAD_SHA" > raw.patch

        if [ ! -s raw.patch ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        ADDITIONS=${{ github.event.pull_request.additions }}
        DELETIONS=${{ github.event.pull_request.deletions }}
        FILES=${{ github.event.pull_request.changed_files }}
        TOTAL=$((ADDITIONS + DELETIONS))
        MAX_LINES=${{ inputs.max_changed_lines }}
        MAX_FILES=${{ inputs.max_changed_files }}

        if [ "$TOTAL" -gt "$MAX_LINES" ] || [ "$FILES" -gt "$MAX_FILES" ]; then
          echo "skip=true" >> "$GITHUB_OUTPUT"
          echo "⚠️ Skipped: PR has ${TOTAL} lines / ${FILES} files (limits: ${MAX_LINES} lines / ${MAX_FILES} files)." 
          exit 0
        fi
        
        echo "skip=false" >> "$GITHUB_OUTPUT"

    - name: AI Review with Gemini + DeepSeek Fallback
      id: review
      if: steps.diff.outputs.skip != 'true'
      shell: bash
      env:
        TECH_STACK: ${{ inputs.tech_stack }}
        PRIMARY_MODEL: ${{ inputs.model }}
        FALLBACK_GEMINI_MODEL: ${{ inputs.fallback_gemini_model }}
        DEEPSEEK_MODEL: ${{ inputs.deepseek_model }}
        GEMINI_KEY: ${{ inputs.gemini_api_key }}
        DEEPSEEK_KEY: ${{ inputs.deepseek_api_key }}
      run: |
        set -euo pipefail

        # -----------------------------------------------------------------
        # 1. Truncate oversized diffs to avoid argument/request limits
        # -----------------------------------------------------------------
        MAX_DIFF=200000
        if [ -f raw.patch ]; then
          size=$(wc -c < raw.patch)
          if [ "$size" -gt "$MAX_DIFF" ]; then
            echo "⚠️ Diff too large (${size} bytes). Truncating to ${MAX_DIFF} bytes."
            head -c "$MAX_DIFF" raw.patch > raw.truncated.patch
            printf '\n\n--- PATCH TRUNCATED: original was %s bytes. Review may be incomplete. ---\n\n' "$size" >> raw.truncated.patch
            mv raw.truncated.patch raw.patch
          fi
        fi

        # -----------------------------------------------------------------
        # 2. Build the prompt into a temp file (no large shell vars)
        # -----------------------------------------------------------------
        if [ -z "$TECH_STACK" ]; then
          CONTEXT_INSTRUCTION=$(cat << 'EOF'
        You are reviewing a Pull Request for an **unspecified codebase**.
        **Do not assume any specific framework.**
        Analyze the `git diff` to identify the primary language(s) and frameworks being used.
        Focus on generic, universal principles: security vulnerabilities (OWASP Top 10),
        performance bottlenecks (N+1 queries, O(n^2) loops), and maintainability (DRY, SOLID).
        EOF
        )
        else
          CONTEXT_INSTRUCTION="You are reviewing a Pull Request for a codebase written in: **${TECH_STACK}**."
        fi

        PROMPT=$(cat << 'EOF'
        ${CONTEXT_INSTRUCTION}

        You are viewing only the `git diff`. Focus on **cascading impact**.
        Do NOT comment on formatting, indentation, or missing semicolons.

        **Analysis Tiers:**
        1. **🔴 Critical (Blocking Merge):**
           - Security vulnerabilities (SQLi, XSS, exposed secrets).
           - Data corruption/loss risks (bad transaction boundaries).
           - Unhandled exceptions that crash the runtime.

        2. **🟡 Performance & Scalability:**
           - N+1 queries, missing indexes.
           - Blocking I/O in async loops, memory leaks.
           - Inefficient algorithms (O(n²)).

        3. **🔵 Maintainability & Architecture:**
           - SRP violations (functions > 200 lines).
           - Debugging leftovers: `console.log`, `debugger`, `pdb`.

        **OUTPUT RULES:**
        - Start directly with the Analysis Tiers or Risk Score.
        - If a Tier has no issues, omit it.
        - **MUST end with a Risk Score:** `✅ Safe to Merge`, `⚠️ Proceed with Caution`, or `🚨 Blocked`.

        **Final Rule:** If nothing is found, reply exactly:
        > LGTM! No structural, security, or performance issues identified.
        EOF
        )

        ESCAPED_CONTEXT=$(printf '%s\n' "$CONTEXT_INSTRUCTION" | sed 's/[&/\]/\\&/g')
        PROMPT=$(echo "$PROMPT" | sed "s/\${CONTEXT_INSTRUCTION}/$ESCAPED_CONTEXT/g")

        # Build full content (prompt + diff) into a temp file
        COMBINED_FILE=$(mktemp)
        printf '%s\n\nDiff:\n```diff\n' "$PROMPT" > "$COMBINED_FILE"
        cat raw.patch >> "$COMBINED_FILE"
        printf '\n```' >> "$COMBINED_FILE"

        # -----------------------------------------------------------------
        # 3. Helper: Call Gemini (file-based, no large args)
        # -----------------------------------------------------------------
        call_gemini() {
          local model="$1"
          local out_file="$2"
          local status_file="$3"
          
          local json_file
          json_file=$(mktemp)
          jq -n --rawfile c "$COMBINED_FILE" '{contents:[{parts:[{text:$c}]}], generationConfig:{temperature:0.1}}' > "$json_file"
          
          local response_file
          response_file=$(mktemp)
          local http_code
          
          http_code=$(curl -sS -w "%{http_code}" -o "$response_file" \
            --retry 2 --retry-delay 2 \
            -H "x-goog-api-key: $GEMINI_KEY" \
            -H "Content-Type: application/json" \
            -d @"$json_file" \
            "https://generativelanguage.googleapis.com/v1beta/models/$model:generateContent")
          
          if [ "$http_code" -eq 200 ]; then
            jq -r '.candidates[0].content.parts[0].text // "LGTM! No structural, security, or performance issues identified."' "$response_file" > "$out_file"
            echo "SUCCESS" > "$status_file"
            rm -f "$response_file" "$json_file"
            return 0
          else
            if [ "$http_code" -eq 429 ]; then
              echo "RATE_LIMIT" > "$status_file"
            elif [ "$http_code" -eq 503 ] || [ "$http_code" -eq 500 ]; then
              echo "SERVICE_UNAVAILABLE" > "$status_file"
            else
              echo "ERROR_$http_code" > "$status_file"
            fi
            rm -f "$response_file" "$json_file"
            return 1
          fi
        }

        # -----------------------------------------------------------------
        # 4. Helper: Call DeepSeek (file-based, no large args)
        # -----------------------------------------------------------------
        call_deepseek() {
          local model="$1"
          local out_file="$2"
          
          local json_file
          json_file=$(mktemp)
          jq -n --arg m "$model" --rawfile c "$COMBINED_FILE" '{
            model: $m,
            messages: [{role: "user", content: $c}],
            temperature: 0.1,
            stream: false
          }' > "$json_file"
          
          local response_file
          response_file=$(mktemp)
          local http_code
          
          http_code=$(curl -sS -w "%{http_code}" -o "$response_file" \
            --retry 2 --retry-delay 2 \
            -H "Authorization: Bearer $DEEPSEEK_KEY" \
            -H "Content-Type: application/json" \
            -d @"$json_file" \
            "https://api.deepseek.com/chat/completions")
          
          if [ "$http_code" -eq 200 ]; then
            jq -r '.choices[0].message.content // "LGTM! No structural, security, or performance issues identified."' "$response_file" > "$out_file"
            rm -f "$response_file" "$json_file"
            return 0
          else
            rm -f "$response_file" "$json_file"
            return 1
          fi
        }

        # -----------------------------------------------------------------
        # 5. Execute fallback chain
        # -----------------------------------------------------------------
        STATUS_SIGNAL=$(mktemp)
        OUT_PAYLOAD=$(mktemp)

        echo "🔄 Attempting primary model: $PRIMARY_MODEL"
        # We temporarily disable 'set -e' layout via || true to handle error signaling safely
        call_gemini "$PRIMARY_MODEL" "$OUT_PAYLOAD" "$STATUS_SIGNAL" && RC=$? || RC=$?

        if [ "$RC" -ne 0 ]; then
          SIGNAL=$(cat "$STATUS_SIGNAL")
          if [ "$SIGNAL" = "RATE_LIMIT" ]; then
            echo "⚠️ Rate limit hit on $PRIMARY_MODEL. Pausing 5s before fallback..."
            sleep 5
          fi
          
          echo "🔄 Attempting fallback Gemini: $FALLBACK_GEMINI_MODEL"
          call_gemini "$FALLBACK_GEMINI_MODEL" "$OUT_PAYLOAD" "$STATUS_SIGNAL" && RC=$? || RC=$?
          
          if [ "$RC" -ne 0 ] && [ -n "$DEEPSEEK_KEY" ]; then
            echo "🔄 Attempting DeepSeek: $DEEPSEEK_MODEL"
            call_deepseek "$DEEPSEEK_MODEL" "$OUT_PAYLOAD" && RC=$? || RC=$?
          fi
        fi

        # Check final fallback status state layout
        if [ "$RC" -eq 0 ]; then
          cat "$OUT_PAYLOAD" > review.md
          echo "✅ Audit generation process finalized successfully."
        else
          echo "❌ All AI execution endpoints dropped or throttled responses."
          echo "⚠️ Automated review engine systems are currently heavily throttled. Please proceed with standard human peer review checks." > review.md
        fi

        rm -f "$STATUS_SIGNAL" "$OUT_PAYLOAD" "$COMBINED_FILE"

    - name: Post Review Comment
      shell: bash
      if: steps.diff.outputs.skip != 'true'
      env:
        GH_TOKEN: ${{ github.token }}
        PR: ${{ github.event.pull_request.number }}
      run: |
        set -euo pipefail

        perl -i -pe 's/\\n/\n/g' review.md
        sed -i -e '/./,$!d' review.md

        printf '## 🛡️ AI Automated Audit\n\n' > comment.md
        cat review.md >> comment.md

        gh pr comment "$PR" --body-file comment.md
