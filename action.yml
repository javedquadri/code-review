name: 'AI Code Review'
description: 'AI-powered PR review with strict security, quality, and performance gate'

inputs:
  gemini_api_key:
    description: 'Gemini API Key from Google AI Studio'
    required: true
  deepseek_api_key:
    description: 'DeepSeek API Key used only if Gemini fails'
    required: false
    default: ''
  model:
    description: 'Primary Gemini model'
    required: false
    default: 'gemini-3.5-flash'
  fallback_gemini_model:
    description: 'Fallback Gemini model used only if primary Gemini fails'
    required: false
    default: 'gemini-2.5-flash'
  deepseek_model:
    description: 'DeepSeek model used only if Gemini fallbacks fail'
    required: false
    default: 'deepseek-v4-flash'
  tech_stack:
    description: 'Tech stack summary. Leave blank for lightweight AI detection from diff.'
    required: false
    default: ''
  max_changed_lines:
    description: 'Maximum changed lines allowed for AI review. Oversized PRs fail instead of being partially reviewed.'
    required: false
    default: '2500'
  max_changed_files:
    description: 'Maximum changed files allowed for AI review. Oversized PRs fail instead of being partially reviewed.'
    required: false
    default: '50'
  max_patch_bytes:
    description: 'Maximum compact patch bytes sent to the model. Oversized compact patches fail instead of being truncated.'
    required: false
    default: '160000'
  fail_on_caution:
    description: 'Whether CAUTION verdict should fail the check. Recommended false to block only serious findings.'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Prepare Compact Diff
      id: diff
      shell: bash
      run: |
        set -euo pipefail

        BASE_SHA='${{ github.event.pull_request.base.sha }}'
        HEAD_SHA='${{ github.event.pull_request.head.sha }}'

        git fetch --no-tags origin "$BASE_SHA" "$HEAD_SHA"

        ADDITIONS='${{ github.event.pull_request.additions }}'
        DELETIONS='${{ github.event.pull_request.deletions }}'
        FILES='${{ github.event.pull_request.changed_files }}'
        TOTAL=$((ADDITIONS + DELETIONS))
        MAX_LINES='${{ inputs.max_changed_lines }}'
        MAX_FILES='${{ inputs.max_changed_files }}'
        MAX_PATCH_BYTES='${{ inputs.max_patch_bytes }}'

        if [ "$TOTAL" -eq 0 ]; then
          echo 'skip=true' >> "$GITHUB_OUTPUT"
          echo 'skip_reason=No code diff found.' >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ "$TOTAL" -gt "$MAX_LINES" ] || [ "$FILES" -gt "$MAX_FILES" ]; then
          echo 'skip=false' >> "$GITHUB_OUTPUT"
          echo 'oversized=true' >> "$GITHUB_OUTPUT"
          echo "oversized_reason=PR too large for reliable AI review: ${TOTAL} changed lines / ${FILES} files. Limits: ${MAX_LINES} lines / ${MAX_FILES} files." >> "$GITHUB_OUTPUT"
          exit 0
        fi

        git diff --name-only "$BASE_SHA...$HEAD_SHA" > changed-files.txt

        grep -Ev '(^|/)(dist|build|coverage|node_modules|vendor|.wrangler|.next|.turbo|.vite)/|(^|/)(pnpm-lock.yaml|package-lock.json|yarn.lock|bun.lockb)$|\.(png|jpg|jpeg|gif|webp|svg|ico|pdf|zip|gz|tar|mp4|mov|woff|woff2|ttf|eot)$' changed-files.txt > review-files.txt || true

        if [ ! -s review-files.txt ]; then
          echo 'skip=true' >> "$GITHUB_OUTPUT"
          echo 'skip_reason=Only generated, lock, binary, vendored, or asset files changed.' >> "$GITHUB_OUTPUT"
          exit 0
        fi

        : > compact.patch
        while IFS= read -r file; do
          [ -z "$file" ] && continue
          git diff --no-ext-diff --unified=2 "$BASE_SHA...$HEAD_SHA" -- "$file" >> compact.patch || true
          printf '\n' >> compact.patch
        done < review-files.txt

        if [ ! -s compact.patch ]; then
          echo 'skip=true' >> "$GITHUB_OUTPUT"
          echo 'skip_reason=No reviewable textual patch found.' >> "$GITHUB_OUTPUT"
          exit 0
        fi

        PATCH_BYTES=$(wc -c < compact.patch | tr -d ' ')
        if [ "$PATCH_BYTES" -gt "$MAX_PATCH_BYTES" ]; then
          echo 'skip=false' >> "$GITHUB_OUTPUT"
          echo 'oversized=true' >> "$GITHUB_OUTPUT"
          echo "oversized_reason=Compact patch too large for cost-effective reliable review: ${PATCH_BYTES} bytes. Limit: ${MAX_PATCH_BYTES} bytes. Split the PR." >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo 'skip=false' >> "$GITHUB_OUTPUT"
        echo 'oversized=false' >> "$GITHUB_OUTPUT"
        echo "patch_bytes=$PATCH_BYTES" >> "$GITHUB_OUTPUT"

    - name: Handle Skipped Review
      if: steps.diff.outputs.skip == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR: ${{ github.event.pull_request.number }}
        SKIP_REASON: ${{ steps.diff.outputs.skip_reason }}
      run: |
        set -euo pipefail
        {
          echo '## 🛡️ AI Code Review'
          echo
          echo "Skipped: ${SKIP_REASON:-No reviewable changes.}"
        } > comment.md
        gh pr comment "$PR" --body-file comment.md

    - name: Fail Oversized PR
      if: steps.diff.outputs.oversized == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR: ${{ github.event.pull_request.number }}
        OVERSIZED_REASON: ${{ steps.diff.outputs.oversized_reason }}
      run: |
        set -euo pipefail
        {
          echo '## 🛡️ AI Code Review - Blocked'
          echo
          echo "🚨 ${OVERSIZED_REASON}"
          echo
          echo 'Please split this PR into smaller reviewable changes. The review is intentionally not truncated because partial AI review can miss security, correctness, or performance risks.'
        } > comment.md
        gh pr comment "$PR" --body-file comment.md
        exit 1

    - name: AI Review Single Compact Call
      id: review
      if: steps.diff.outputs.skip != 'true' && steps.diff.outputs.oversized != 'true'
      shell: bash
      env:
        TECH_STACK: ${{ inputs.tech_stack }}
        PRIMARY_MODEL: ${{ inputs.model }}
        FALLBACK_GEMINI_MODEL: ${{ inputs.fallback_gemini_model }}
        DEEPSEEK_MODEL: ${{ inputs.deepseek_model }}
        GEMINI_KEY: ${{ inputs.gemini_api_key }}
        DEEPSEEK_KEY: ${{ inputs.deepseek_api_key }}
        PATCH_BYTES: ${{ steps.diff.outputs.patch_bytes }}
      run: |
        set -euo pipefail

        PROMPT_FILE=$(mktemp)

        TECH_CONTEXT="$TECH_STACK"
        if [ -z "$TECH_CONTEXT" ]; then
          if [ -f package.json ]; then
            PM='unknown'
            [ -f pnpm-lock.yaml ] && PM='pnpm'
            [ -f package-lock.json ] && PM='npm'
            [ -f yarn.lock ] && PM='yarn'
            [ -f bun.lockb ] && PM='bun'
            TECH_CONTEXT="JavaScript/TypeScript repository; package manager: ${PM}; infer frameworks from file paths and diff only."
          else
            TECH_CONTEXT='Unknown repository; infer languages/frameworks from changed file paths and diff only.'
          fi
        fi

        {
          printf '%s\n' 'You are an expert pull request reviewer. Review ONLY the compact git diff provided below.'
          printf '\n'
          printf '%s\n' 'Goal: strict, high-signal review similar to a senior security/performance/code-quality reviewer.'
          printf '\n'
          printf '%s\n' 'Repository context:'
          printf '%s\n' "- Tech stack: ${TECH_CONTEXT}"
          printf '%s\n' '- Review scope: changed textual files only'
          printf '%s\n' "- Patch size: ${PATCH_BYTES} bytes"
          printf '\n'
          printf '%s\n' 'For each issue, report the line number from the new file (the + side of the diff).'
          printf '\n'
          printf '%s\n' 'Rules:'
          printf '%s\n' '- Do not complain about formatting, style preferences, indentation, or missing semicolons unless they create real risk.'
          printf '%s\n' '- Do not invent issues outside the diff.'
          printf '%s\n' '- Prefer fewer high-confidence findings over many weak suggestions.'
          printf '%s\n' '- A finding must be actionable and tied to changed code.'
          printf '%s\n' '- Mark as BLOCKED only for issues that should stop merge.'
          printf '%s\n' '- Mark as CAUTION for meaningful but non-blocking concerns.'
          printf '%s\n' '- Mark as SAFE when no meaningful issues exist.'
          printf '\n'
          printf '%s\n' 'Review priorities:'
          printf '%s\n' '1. Security: authz/authn bypass, secret leakage, injection, XSS, SSRF, unsafe redirects, insecure crypto, unsafe logging, tenant/user data exposure, missing validation, production fail-open behavior.'
          printf '%s\n' '2. Correctness: broken control flow, async bugs, error handling gaps, data loss/corruption, race conditions, broken API contracts, edge cases, regressions.'
          printf '%s\n' '3. TypeScript/code quality: unsafe any/casts, type holes, brittle abstractions, bad narrowing, schema/type mismatch, maintainability issues that can cause bugs.'
          printf '%s\n' '4. Performance/scalability: N+1 calls, unnecessary re-renders, expensive loops, memory leaks, blocking I/O, inefficient DB/API access, cache misuse.'
          printf '%s\n' '5. React/frontend when applicable: hook rule violations, stale closures, effect dependency bugs, accessibility regressions, hydration/runtime risks.'
          printf '%s\n' '6. Testing: missing tests only when the changed code introduces meaningful logic or a regression risk.'
          printf '\n'
          printf '%s\n' 'Return STRICT JSON only. No markdown fences. No prose outside JSON.'
          printf '\n'
          printf '%s\n' 'Schema:'
          printf '%s\n' '{'
          printf '%s\n' '  "verdict": "SAFE" | "CAUTION" | "BLOCKED",'
          printf '%s\n' '  "summary": "one short sentence",'
          printf '%s\n' '  "issues": ['
          printf '%s\n' '    {'
          printf '%s\n' '      "severity": "critical" | "high" | "medium" | "low",'
          printf '%s\n' '      "category": "security" | "correctness" | "performance" | "typescript" | "react" | "testing" | "maintainability",'
          printf '%s\n' '      "file": "path/to/file",'
          printf '%s\n' '      "line": 0,'
          printf '%s\n' '      "title": "short issue title",'
          printf '%s\n' '      "why_it_matters": "brief concrete risk",'
          printf '%s\n' '      "suggested_fix": "brief actionable fix"'
          printf '%s\n' '    }'
          printf '%s\n' '  ]'
          printf '%s\n' '}'
          printf '\n'
          printf '%s\n' 'Verdict policy:'
          printf '%s\n' '- BLOCKED: any critical/high issue, security risk, correctness bug, data loss risk, production fail-open behavior, or likely runtime break.'
          printf '%s\n' '- CAUTION: only medium/low issues remain.'
          printf '%s\n' '- SAFE: no meaningful issues.'
          printf '\n'
          printf '%s\n' 'Diff:'
        } > "$PROMPT_FILE"
        printf '```diff\n' >> "$PROMPT_FILE"
        cat compact.patch >> "$PROMPT_FILE"
        printf '\n```\n' >> "$PROMPT_FILE"

        call_gemini() {
          local model="$1"
          local out_file="$2"
          local status_file="$3"
          local json_file
          json_file=$(mktemp)
          jq -n --rawfile c "$PROMPT_FILE" '{contents:[{parts:[{text:$c}]}], generationConfig:{temperature:0.05, responseMimeType:"application/json"}}' > "$json_file"

          local response_file
          response_file=$(mktemp)
          local http_code
          http_code=$(curl -sS -w "%{http_code}" -o "$response_file" \
            --retry 2 --retry-delay 2 \
            -H "x-goog-api-key: $GEMINI_KEY" \
            -H 'Content-Type: application/json' \
            -d @"$json_file" \
            "https://generativelanguage.googleapis.com/v1beta/models/$model:generateContent")

          if [ "$http_code" -eq 200 ]; then
            jq -r '.candidates[0].content.parts[0].text // empty' "$response_file" > "$out_file"
            echo 'SUCCESS' > "$status_file"
            rm -f "$response_file" "$json_file"
            return 0
          fi

          if [ "$http_code" -eq 429 ]; then
            echo 'RATE_LIMIT' > "$status_file"
          elif [ "$http_code" -eq 500 ] || [ "$http_code" -eq 503 ]; then
            echo 'SERVICE_UNAVAILABLE' > "$status_file"
          else
            echo "ERROR_$http_code" > "$status_file"
          fi

          echo "Gemini failed: model=$model http=$http_code status=$(cat "$status_file")"
          rm -f "$response_file" "$json_file"
          return 1
        }

        call_deepseek() {
          local model="$1"
          local out_file="$2"
          local json_file
          json_file=$(mktemp)
          jq -n --arg m "$model" --rawfile c "$PROMPT_FILE" '{model:$m,messages:[{role:"user",content:$c}],temperature:0.05,stream:false,response_format:{type:"json_object"}}' > "$json_file"

          local response_file
          response_file=$(mktemp)
          local http_code
          http_code=$(curl -sS -w "%{http_code}" -o "$response_file" \
            --retry 2 --retry-delay 2 \
            -H "Authorization: Bearer $DEEPSEEK_KEY" \
            -H 'Content-Type: application/json' \
            -d @"$json_file" \
            'https://api.deepseek.com/chat/completions')

          if [ "$http_code" -eq 200 ]; then
            jq -r '.choices[0].message.content // empty' "$response_file" > "$out_file"
            rm -f "$response_file" "$json_file"
            return 0
          fi

          echo "DeepSeek failed: model=$model http=$http_code"
          rm -f "$response_file" "$json_file"
          return 1
        }

        STATUS_SIGNAL=$(mktemp)
        RAW_REVIEW=$(mktemp)
        RC=0

        echo "Reviewing compact diff with $PRIMARY_MODEL"
        call_gemini "$PRIMARY_MODEL" "$RAW_REVIEW" "$STATUS_SIGNAL" && RC=$? || RC=$?

        if [ "$RC" -ne 0 ]; then
          SIGNAL=$(cat "$STATUS_SIGNAL" 2>/dev/null || true)
          [ "$SIGNAL" = 'RATE_LIMIT' ] && sleep 5
          echo "Falling back to Gemini model: $FALLBACK_GEMINI_MODEL"
          call_gemini "$FALLBACK_GEMINI_MODEL" "$RAW_REVIEW" "$STATUS_SIGNAL" && RC=$? || RC=$?
        fi

        if [ "$RC" -ne 0 ] && [ -n "$DEEPSEEK_KEY" ]; then
          echo "Falling back to DeepSeek model: $DEEPSEEK_MODEL"
          call_deepseek "$DEEPSEEK_MODEL" "$RAW_REVIEW" && RC=$? || RC=$?
        fi

        if [ "$RC" -ne 0 ] || [ ! -s "$RAW_REVIEW" ]; then
          jq -n '{
            verdict: "BLOCKED",
            summary: "AI review failed; require human review before merge.",
            issues: [
              {
                severity: "high",
                category: "maintainability",
                file: "workflow",
                line: "AI review",
                title: "Automated review unavailable",
                why_it_matters: "The configured AI reviewers failed or were throttled, so this PR did not receive the required automated quality/security review.",
                suggested_fix: "Retry the workflow or require a human reviewer to complete equivalent security, correctness, performance, and code-quality checks."
              }
            ]
          }' > review.json
        else
          perl -0pi -e 's/^\s*```(?:json)?\s*//; s/\s*```\s*$//' "$RAW_REVIEW"
          if jq -e '.verdict and .issues' "$RAW_REVIEW" >/dev/null 2>&1; then
            cp "$RAW_REVIEW" review.json
          else
            jq -n '{
              verdict: "BLOCKED",
              summary: "AI returned malformed review JSON; require human review before merge.",
              issues: [
                {
                  severity: "high",
                  category: "maintainability",
                  file: "workflow",
                  line: "AI review",
                  title: "Malformed AI review output",
                  why_it_matters: "The workflow could not parse the automated review verdict safely.",
                  suggested_fix: "Retry the workflow or inspect raw logs and perform human review."
                }
              ]
            }' > review.json
          fi
        fi

        VERDICT=$(jq -r '.verdict' review.json)
        echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

        rm -f "$STATUS_SIGNAL" "$RAW_REVIEW" "$PROMPT_FILE"

    - name: Post Inline Review
      if: steps.diff.outputs.skip != 'true' && steps.diff.outputs.oversized != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR: ${{ github.event.pull_request.number }}
        PATCH_BYTES: ${{ steps.diff.outputs.patch_bytes }}
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail

        VERDICT=$(jq -r '.verdict' review.json)
        SUMMARY=$(jq -r '.summary // "No summary provided."' review.json)

        # Map verdict to GitHub review event
        case "$VERDICT" in
          SAFE)    EVENT="APPROVE" ;;
          CAUTION) EVENT="COMMENT" ;;
          BLOCKED) EVENT="REQUEST_CHANGES" ;;
          *)       EVENT="COMMENT" ;;
        esac

        # Build inline comments from review.json issues
        gh api "repos/$REPO/pulls/$PR/reviews" \
          --method POST \
          --input <(jq -n \
            --arg sha "$HEAD_SHA" \
            --arg event "$EVENT" \
            --arg summary "## 🛡️ AI Code Review\n\n**Verdict:** $VERDICT\n**Patch reviewed:** ${PATCH_BYTES} bytes\n\n$SUMMARY" \
            --argjson issues "$(jq -c '.issues | map({path: .file, line: (.line // 0), side: "RIGHT", body: ("**[\(.severity)] [\(.category)]** \(.title)\n\n**Risk:** \(.why_it_matters)\n\n**Fix:** \(.suggested_fix)")})' review.json)" \
            '{
              commit_id: $sha,
              event: $event,
              body: $summary,
              comments: $issues
            }')

    - name: Enforce Review Verdict
      if: steps.diff.outputs.skip != 'true' && steps.diff.outputs.oversized != 'true'
      shell: bash
      env:
        FAIL_ON_CAUTION: ${{ inputs.fail_on_caution }}
      run: |
        set -euo pipefail
        VERDICT=$(jq -r '.verdict' review.json)

        if [ "$VERDICT" = 'BLOCKED' ]; then
          echo 'AI review blocked this PR.'
          exit 1
        fi

        if [ "$VERDICT" = 'CAUTION' ] && [ "$FAIL_ON_CAUTION" = 'true' ]; then
          echo 'AI review returned CAUTION and fail_on_caution=true.'
          exit 1
        fi

        echo "AI review passed with verdict: $VERDICT"
